<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-Emprego - Entrar</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fa-solid fa-briefcase"></i>
                </div>
                <h2>Project<span class="highlight">Job</span></h2>
                <p>Entre na sua conta para gerir as suas candidaturas</p>
            </div>
            
            {% if error %}
            <div class="auth-alert error">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <form action="{{ url_for('login') }}" method="POST" class="auth-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="username">Utilizador</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Digite seu utilizador" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Digite sua palavra-passe" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" class="btn-auth">
                    <span>Entrar</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <span>Não tem uma conta?</span>
                <a href="{{ url_for('register') }}" class="auth-link">Registar-se</a>
            </div>
        </div>
    </div>
</body>
</html>
